<script>
    setTimeout(function() {
        $('.svg').addClass('trace')
    }, 50);
    $(function() {
        wow = new WOW({
            boxClass: 'wow', // default
            animateClass: 'animated', // default
            offset: 0, // default
            mobile: true, // default
            live: true // default
        })
        wow.init();

        function setBannerHeight() {
            var bannerHeight = $(window).height() - $("#header").outerHeight() - $("#footer").outerHeight();
            //$("#banner2").css("cssText", "height: " + bannerHeight + "px !important; margin-top:" + $("#header").outerHeight() + "px !important");
            $("#banner2").css("cssText", "height: " + bannerHeight + "px !important;");
        }

        function setBannerBorder() {
            /*_________
             |         |
             |  LOGO   |
             |_________|*/
            var _maxTypeIcon = 2 /*draw maximum types of icon*/ ,
                _defaultNumIcon = 29,
                _defaultScreenWidth = 1920,
                numIconHorizontal = parseInt(Math.round($(window).width() * _defaultNumIcon / _defaultScreenWidth)),
                numIconVertical = parseInt(Math.round($(window).height() * _defaultNumIcon / _defaultScreenWidth));
            $("#banner2 .banner-border").empty();
            var _html = "";
            // Each column draw 2 dots, except first and last column draw "numIconVertical" dots
            for (i = 1; i <= numIconHorizontal; i++) {
                var dots = (i == 1 || i == numIconHorizontal) ? numIconVertical : 2;
                _html += "<li>";
                for (j = 1; j <= dots; j++) {
                    var name = (dots == 2) ? i : j;
                    _html += "<img class='wow fadeInLeft' data-wow-duration='1s' data-wow-delay='" + (i / 20) + "s' src='/data/images/home/icon_" + String(name % _maxTypeIcon == 0 ? _maxTypeIcon : name % _maxTypeIcon) + ".jpg'>";
                }
                _html += "</li>";
            }
            $("#banner2 .banner-border").html(_html)
        }

        setBannerHeight();
        setBannerBorder();
        $(window).resize(function(e) {
            setBannerHeight();
            setBannerBorder();
        });
    })
</script>
