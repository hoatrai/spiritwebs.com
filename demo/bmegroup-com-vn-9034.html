        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">

        <title>Website hiện không hoạt động</title>

        <!-- Styles -->
        <style>
            :root {
                --angle: 45deg;
                --opacity: 0.5;
            }

            *,
            *::before,
            *::after {
                box-sizing: border-box;
            }

            .rainbow {
                border-radius: 10px;
                padding: 2rem;
                margin: 1.75rem;

                display: grid;
                place-content: center;
                text-align: center;

                font-size: 1.5em;

                --border-size: 0.3rem;
                border: var(--border-size) solid transparent;

                /* Paint an image in the border */
                border-image: conic-gradient(
                    from var(--angle),
                    #d6001b 0deg 90deg,
                    #f7ad30 90deg 180deg,
                    #166dc8 180deg 270deg,
                    #49c98d 270deg 360deg
                    )
                    1 stretch;
                background: rgb(255 255 255 / var(--opacity));
            }

            /** show a warning in browers that don't support it **/
            .warning {
                margin: 2em;
                padding: 1em;
                border: 1px solid #ccc;
            }
            .warning p {
                margin: 0;
                padding: 0;
                text-align: center;
            }
            /* Animate when Houdini is available */
            @supports (background: paint(houdini)) {
            @property --opacity {
                syntax: "<number>";
                initial-value: 0.5;
                inherits: false;
            }

            @property --angle {
                syntax: "<angle>";
                initial-value: 0deg;
                inherits: false;
            }

            @keyframes opacityChange {
                to {
                --opacity: 1;
                }
            }

            @keyframes rotate {
                to {
                --angle: 360deg;
                }
            }

            .rainbow {
                animation: rotate 4s linear infinite, opacityChange 3s infinite alternate;
            }

            /* Hide the warning */
            .warning {
                display: none;
            }
            }
            html, body {
                background-color: #ecf5ff;
                color: #837474;
                font-family: 'system-ui', sans-serif;
                font-weight: 200;
                height: 100vh;
                margin: 0;
            }

            .full-height {
                height: 100vh;
            }

            .flex-center {
                align-items: center;
                display: flex;
                justify-content: center;
            }
            .gap-6 {
                gap: 3rem;
            }
            .position-ref {
                position: relative;
            }

            .top-right {
                position: absolute;
                right: 10px;
                top: 18px;
            }

            .content {
                text-align: center;
            }

            .title {
                font-size: 3rem;
            }

            .m-b-md {
                margin-bottom: 30px;
            }
        </style>
    </head>
