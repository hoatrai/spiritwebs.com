<link rel="stylesheet" id="forms-css" href="https://bongda.lu/wp-admin/css/forms.min.css?ver=6.9.1" type="text/css" media="all">
<link rel="stylesheet" id="l10n-css" href="https://bongda.lu/wp-admin/css/l10n.min.css?ver=6.9.1" type="text/css" media="all">

<style media="screen">
#login_error, .login .message, #loginform { margin-bottom: 20px; }
.password-protected-text-below { display: inline-block; text-align: center; margin-top: 30px;}
.password-protected-text-above { text-align: center; margin-bottom: 10px;}
</style>

<meta name="robots" content="noindex, nofollow">
		<meta name="viewport" content="width=device-width">
		
</head>
<body class="login login-password-protected login-action-password-protected-login wp-core-ui">

<div id="login">
	<h1 class="wp-login-logo" id="password-protected-logo"><a href="https://bongda.lu/" title="bongda.lu">bongda.lu</a></h1>
	
	
	<form name="loginform" id="loginform" action="https://bongda.lu/?password-protected=login&amp;redirect_to=https%3A%2F%2Fbongda.lu%2F" method="post">

        <p>
                    </p>

        <!--
		We are removing this field PP-245
             <p>
                <label for="password_protected_pass">Password</label>
                <input type="password" name="password_protected_pwd" id="password_protected_pass" class="input" value="" size="20" tabindex="20" autocomplete="false" />
            </p>
        -->

        <div class="user-pass-wrap">
            <label for="password_protected_pass">Password</label>
            <div class="wp-pwd">
                <input id="password_protected_pass" class="input password-input" type="password" name="password_protected_pwd" value="" size="20" autocomplete="false" spellcheck="false" required="" style="">
                <button id="pp-hide-show-password" class="button button-secondary hide-if-no-js wp-hide-pw" type="button" data-toggle="0" aria-label="Show password">
                    <span class="dashicons dashicons-visibility" aria-hidden="true"></span>
                </button>
            </div>
        </div>

						
		<p class="submit">
			<input type="submit" name="wp-submit" id="wp-submit" class="button button-primary button-large" value="Đăng nhập" tabindex="100" style="">
			<input type="hidden" name="password_protected_cookie_test" value="1" style="">
			<input type="hidden" name="password-protected" value="login" style="">
			<input type="hidden" name="redirect_to" value="https://bongda.lu/" style="">
		</p>

        <div style="display: table;clear: both;"></div>

        <p>
		            </p>

	</form>

	
</div>

<script>
try{document.getElementById('password_protected_pass').focus();}catch(e){}
if(typeof wpOnload=='function')wpOnload();
try{let s=document.getElementById("pp-hide-show-password");s.addEventListener("click",function(e){e.preventDefault();let t=document.getElementById("password_protected_pass");"password"===t.type?(t.type="text",s.innerHTML='<span class="dashicons dashicons-hidden" aria-hidden="true"></span>'):(t.type="password",s.innerHTML='<span class="dashicons dashicons-visibility" aria-hidden="true"></span>')})}catch(e){}
</script>


<div class="clear"></div>
