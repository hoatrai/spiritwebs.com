<!DOCTYPE html><html><head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hết hạn sử dụng</title>
    <link rel="stylesheet" href="https://bizweb.dktcdn.net/static/fonts/inter/inter.css">
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
      }

      *,
      :after,
      :before {
        box-sizing: border-box;
      }

      body {
        font-weight: 450;
        letter-spacing: -0.2px;
        text-rendering: optimizelegibility;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "San Francisco", "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      }
      .btn {
        padding: 0.439vw 1.171vw;
        display: flex;
        align-items: center;
        gap: 0.586vw;
        font-size: 1.025vw;
        font-style: normal;
        font-weight: 450;
        line-height: 1.464vw;
        letter-spacing: 0.07px;
        border-radius: 0.439vw;
        background: #08f;
        border: 1px solid #08f;
        text-decoration: none;
        color: #fff;
      }
      .btn strong {
        font-weight: 600;
      }
      .btn svg {
        width: 1.757vw;
        height: 1.757vw;
        flex-shrink: 0;
      }
      .btn:hover {
        background: #33a0ff;
        border-color: #33a0ff;
      }
      .btn:active {
        background: #007ce8;
        border-color: #007ce8;
      }

      .btn.btn-outline {
        background: #fff;
        color: #08f;
      }
      .btn.btn-outline:hover {
        background: #f2f9ff;
      }
      .btn.btn-outline:active {
        background: #e6f4ff;
      }
      .container {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 1.464vw 0;
        overflow: hidden;
      }
      .container .bg-left {
        position: absolute;
        top: 17.12vh;
        left: 2.928vw;
      }
      .container .bg-left svg {
        width: 8.126vw;
        height: 2.928vw;
      }
      .content-wrapper {
        display: flex;
        gap: 1.464vw;
        align-items: center;
        max-width: 77.306vw;
      }
      .content-wrapper .block-content {
        width: 36.603vw;
        flex-shrink: 0;
      }
      .content-wrapper .block-img img {
        width: 50.512vw;
        height: 27.086vw;
      }
      .content-wrapper h1 {
        font-size: 2.05vw;
        font-style: normal;
        font-weight: 600;
        line-height: 2.635vw;
        color: #0f1824;
        margin: 0 0 0.878vw;
      }
      .content-wrapper p {
        font-size: 1.171vw;
        font-style: normal;
        font-weight: 450;
        line-height: 1.464vw;
        color: #46515f;
        margin-bottom: 1.903vw;
      }
      .content-wrapper p span {
		font-weight: 600;
      }
      .container .actions {
        display: flex;
        gap: 1.171vw;
        flex-wrap: wrap;
      }
      @media screen and (max-width: 1366px) {
        .btn {
          padding: 6px 16px;
          gap: 8px;
          font-size: 14px;
          line-height: 20px;
          border-radius: 6px;
        }
        .btn svg {
          width: 24px;
          height: 24px;
        }
        .container .bg-left svg {
          width: 111px;
          height: 40px;
        }
        .content-wrapper {
          max-width: 1056px;
        }
        .content-wrapper .block-content {
          width: 500px;
        }
        .content-wrapper h1 {
          font-size: 28px;
          line-height: 36px;
          margin-bottom: 12px;
        }
        .content-wrapper p {
          font-size: 16px;
          line-height: 20px;
          margin-bottom: 26px;
        }
        .content-wrapper .block-img img {
          width: 690px;
          height: 370px;
        }
        .container .actions {
          gap: 16px;
        }
      }
      @media screen and (max-width: 1199px) {
        .container .bg-left {
          display: none;
        }
        .content-wrapper {
          max-width: 100%;
          padding: 0 20px;
        }
      }
      @media screen and (max-width: 991px) {
        .content-wrapper .block-img {
          display: none;
        }
        .content-wrapper .block-content {
          text-align: center;
          max-width: 100%;
        }
        .container .actions {
          justify-content: center;
        }
      }
      @media screen and (max-width: 475px) {
        .content-wrapper p br {
          display: none;
        }
      }
    </style>
  </head>

        <div class="block-img">
          <img src="https://bizweb.dktcdn.net/assets/images/bg-expired.svg" alt="Hết hạn sử dụng">
        </div>
      </div>
    </div>
