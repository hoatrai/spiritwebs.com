  font-size: 1rem;
  text-align: left;
}</style></div><div class="row" id="row-2134857445"><div id="col-1054337856" class="col small-12 large-12"><div class="col-inner"><div class="accordion"><div id="accordion-3348474144" class="accordion-item">
<a id="accordion-3348474144-label" class="accordion-title plain" href="#accordion-item-nhà-thông-minh-(smart-home)-là-gì?" aria-expanded="false" aria-controls="accordion-3348474144-content">
<button class="toggle" aria-label="Chuyển đổi"><i class="icon-angle-down"></i></button>
<span>Nhà thông minh (Smart Home) là gì?</span>
</a><div id="accordion-3348474144-content" class="accordion-inner" aria-labelledby="accordion-3348474144-label"><h3 class="thin-font" style="text-align: center;">Nhà thông minh là ngôi nhà được trang bị các thiết bị điện tử có thể điều khiển trực tiếp hoặc từ xa qua smartphone. Đặc biệt với AZ Smarttech bạn có thể điều khiển ngôi nhà của mình bằng giọng nói Tiếng Việt, hệ thống nhà thông minh giúp bạn quản lý, điều khiển và kiểm soát an ninh của ngôi nhà một cách an toàn.</h3></div></div><div id="accordion-1826273118" class="accordion-item">
<a id="accordion-1826273118-label" class="accordion-title plain" href="#accordion-item-lắp-đặt-thiết-bị-nhà-thông-minh-az-smarttech-có-phức-tạp-không?" aria-expanded="false" aria-controls="accordion-1826273118-content">
<button class="toggle" aria-label="Chuyển đổi"><i class="icon-angle-down"></i></button>
<span>Lắp đặt thiết bị nhà thông minh AZ Smarttech có phức tạp không?</span>
</a><div id="accordion-1826273118-content" class="accordion-inner" aria-labelledby="accordion-1826273118-label"><h3 class="thin-font" style="text-align: center;">Với sản phẩm AZ Smarttech bạn có thể tự lắp đặt thiết bị thông minh cho gia đình của mình. Ngoài ra, đội ngũ kỹ thuật từ AZ Smarttech luôn sẵn sàng hỗ trợ bạn trong quá trình tư vấn cũng như cài đặt sản phẩm.</h3></div></div><div id="accordion-3851004595" class="accordion-item">
<a id="accordion-3851004595-label" class="accordion-title plain" href="#accordion-item-tôi-vẫn-chưa-yên-tâm-về-chất-lượng-và-nguồn-gốc-xuất-xứ?" aria-expanded="false" aria-controls="accordion-3851004595-content">
<button class="toggle" aria-label="Chuyển đổi"><i class="icon-angle-down"></i></button>
<span>Tôi vẫn chưa yên tâm về chất lượng và nguồn gốc xuất xứ?</span>
</a><div id="accordion-3851004595-content" class="accordion-inner" aria-labelledby="accordion-3851004595-label"><h3 class="thin-font" style="text-align: center;">Với AZ Smarttech khách hàng hoàn toàn yên tâm và tin tưởng sử dụng dịch vụ. Các thiết bị nhà thông minh đến từ AZ Smarttech đều do các kỹ sư của AZ Smarttech nghiên cứu và hoàn thiện.</h3></div></div><div id="accordion-2616888635" class="accordion-item">
<a id="accordion-2616888635-label" class="accordion-title plain" href="#accordion-item-trong-quá-trình-sử-dụng,-nếu-gặp-vấn-đề-thì-az-smarttech-hỗ-trợ-ra-sao?" aria-expanded="false" aria-controls="accordion-2616888635-content">
<button class="toggle" aria-label="Chuyển đổi"><i class="icon-angle-down"></i></button>
<span>Trong quá trình sử dụng, nếu gặp vấn đề thì AZ Smarttech hỗ trợ ra sao?</span>
</a><div id="accordion-2616888635-content" class="accordion-inner" aria-labelledby="accordion-2616888635-label"><h3 class="thin-font" style="text-align: center;">AZ Smarttech là đơn vị luôn dẫn đầu trong việc hỗ trợ khách hàng và mang lại sự trải nghiệm tốt nhất đến khách hàng. Dịch vụ hiện đang có mặt tại tất cả tỉnh thành trên toàn quốc và hỗ trợ 24/7. Khi có vấn đề, Quý khách hàng có thể liên hệ tổng đài 0793678910 để tiếp nhận thông tin, chăm sóc, hỗ trợ và bảo hành, sửa chữa tận nhà.&lt;/3&gt;</h3></div></div><div id="accordion-4253925420" class="accordion-item">
<a id="accordion-4253925420-label" class="accordion-title plain" href="#accordion-item-sử-dụng-nhà-thông-minh-az-smarttech-có-bị-mất-kết-nối-không?" aria-expanded="false" aria-controls="accordion-4253925420-content">
<button class="toggle" aria-label="Chuyển đổi"><i class="icon-angle-down"></i></button>
<span>Sử dụng nhà thông minh AZ Smarttech có bị mất kết nối không?</span>
</a><div id="accordion-4253925420-content" class="accordion-inner" aria-labelledby="accordion-4253925420-label"><h3 class="thin-font" style="text-align: center;">AZ Smarttech sử dụng các chuẩn kết nối Wifi và Zigbee,&nbsp;đảm bảo&nbsp;hoạt động ổn định trong hệ thống. Các thiết bị sẽ liên kết với nhau thành mạng lưới kết nối được điều khiển bởi thiết bị trung tâm.</h3></div></div><div id="accordion-2719388396" class="accordion-item">
<a id="accordion-2719388396-label" class="accordion-title plain" href="#accordion-item-với-khoản-kinh-phí-bao-nhiêu-thì-có-thể-lắp-đặt-được-nhà-thông-minh-az-smarttech?" aria-expanded="false" aria-controls="accordion-2719388396-content">
<button class="toggle" aria-label="Chuyển đổi"><i class="icon-angle-down"></i></button>
<span>Với khoản kinh phí bao nhiêu thì có thể lắp đặt được nhà thông minh AZ Smarttech?</span>
</a><div id="accordion-2719388396-content" class="accordion-inner" aria-labelledby="accordion-2719388396-label"><h3 class="thin-font" style="text-align: center;">Với kinh phí từ khoảng 10 triệu đồng bạn có thể biến ngôi nhà của mình thành ngôi nhà thông minh.</h3></div></div><div id="accordion-2027686724" class="accordion-item">
<a id="accordion-2027686724-label" class="accordion-title plain" href="#accordion-item-nhà-tôi-đã-hoàn-thiện-rồi-và-muốn-thay-thế-thiết-bị-trong-nhà-thành-thiết-bị-thông-minh-có-được-không?" aria-expanded="false" aria-controls="accordion-2027686724-content">
<button class="toggle" aria-label="Chuyển đổi"><i class="icon-angle-down"></i></button>
<span>Nhà tôi đã hoàn thiện rồi và muốn thay thế thiết bị trong nhà thành thiết bị thông minh có được không?</span>
</a><div id="accordion-2027686724-content" class="accordion-inner" aria-labelledby="accordion-2027686724-label"><h3 class="thin-font" style="text-align: center;">Hoàn toàn được và dễ dàng nâng cấp từ thiết bị bình thường lên các thiết bị thông minh. AZ Smarttech sẽ hỗ trợ tư vấn, khảo sát để đưa ra phương án nâng cấp tối ưu cho khách hàng, mang lại sự trải nghiệm tuyệt vời nhất.</h3></div></div></div></div></div></div></div></div><div id="col-139236829" class="col medium-4 small-12 large-4"><div class="col-inner"><div class="img has-hover x md-x lg-x y md-y lg-y" id="image_272288872"><div class="img-inner dark">
