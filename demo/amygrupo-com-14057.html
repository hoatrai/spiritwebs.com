<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd"><html lang="en" xml:lang="en" xmlns="http://www.w3.org/1999/xhtml"><head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>https://amy.vn/</title>
    <style>
        body {
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            margin: 0;
        }
        iframe {
            display: block; /* iframes are inline by default */
            border: none; /* Reset default border */
            height: 100vh; /* Viewport-relative units */
            width: 100vw;
        }
    </style>
    <script type="text/javascript">
        function loadIFrameDelay() {
            window.setTimeout(loadIFrame, 3000);
        }

        function loadIFrame() {
            var s = "https://amy.vn/";
            var iframe1 = document.getElementById('realsite');
            if (-1 == navigator.userAgent.indexOf("MSIE")) {
                iframe1.src = s;
            }
            else {
                iframe1.location = s;
            }
        }
    </script>
</head>
<body onload="loadIFrameDelay()">
    <iframe id="realsite" src="https://amy.vn/"></iframe>

 </body></html>
